name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            targets: --linux
          - os: windows-latest
            targets: --win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Compile server + electron
        run: npm run electron:compile

      - name: Build Electron app
        run: npx electron-builder ${{ matrix.targets }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voicetex-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.exe
          if-no-files-found: ignore

  build-rust:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: voicetex-backend
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: voicetex-backend.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build frontend
        run: npm ci && npm run build

      - name: Build Rust backend
        run: cargo build --release --manifest-path backend-rust/Cargo.toml --target ${{ matrix.target }}

      - name: Upload Rust binary
        uses: actions/upload-artifact@v4
        with:
          name: voicetex-rust-${{ matrix.os }}
          path: backend-rust/target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    needs: [build, build-rust]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
